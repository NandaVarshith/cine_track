spring.application.name=demo
spring.config.import=optional:file:.env[.properties]
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/movies}
app.jwt.secret=${JWT_SECRET:dev-secret-please-change-immediately-32b}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
groq.api.key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
